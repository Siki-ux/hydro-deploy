# docker-compose.tunnel.yml
#
# Adds a Cloudflare Tunnel (cloudflared) to the stack.
# This gives secure HTTPS internet access without opening firewall ports.
#
# Setup:
#   1. Go to https://one.dash.cloudflare.com → Networks → Tunnels → Create tunnel
#   2. Name it (e.g. hydro-platform)
#   3. Under "Public Hostnames", add:
#        Subdomain: *         Domain: your-domain.com
#        Service:   http://proxy:80   (TSM nginx proxy container)
#      Or add specific subdomains per service:
#        portal.your-domain.com  → http://proxy:80
#        api.your-domain.com     → http://water-dp-api:8000
#   4. Copy the tunnel token and set CLOUDFLARE_TUNNEL_TOKEN in .env
#
# Modes:
#   Quick tunnel (no token needed): generates a random *.trycloudflare.com URL.
#     Leave CLOUDFLARE_TUNNEL_TOKEN empty in .env.
#
#   Named tunnel (stable domain): set CLOUDFLARE_TUNNEL_TOKEN in .env.
#     The container will use `tunnel run` with the token.
#
# Usage:
#   make up-tunnel          # start everything including the tunnel
#   make logs-tunnel        # follow cloudflared logs

services:
  cloudflared:
    image: cloudflare/cloudflared:2024.12.2
    container_name: hydro-cloudflared
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    # If TUNNEL_TOKEN is set, run a named tunnel; otherwise run a quick tunnel.
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -n "$$TUNNEL_TOKEN" ]; then
          exec cloudflared tunnel --no-autoupdate run --token "$$TUNNEL_TOKEN"
        else
          exec cloudflared tunnel --no-autoupdate --url http://proxy:80
        fi
    networks:
      - water_shared_net
    depends_on:
      proxy:
        condition: service_healthy

networks:
  water_shared_net:
    name: hydro-platform-net
    external: true
